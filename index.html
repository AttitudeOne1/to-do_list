<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="utf-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=National+Park:wght@200..800&display=swap" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
  <title>Менеджер задач</title>
</head>

<body class="page">
  <header>
    <h1>Менеджер задач</h1>
  </header>

  <main>

    <section class="new-task close">
      <div class="new-task-container">
        <h2 class="add-new-task">Добавить новую задачу</h2>
        <button class="new-task-button-close" type="button">
          <svg width="19" height="19" viewBox="0 0 19 19" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M18.6667 10.6667H10.6667V18.6667H8V10.6667H0V8H8V0H10.6667V8H18.6667V10.6667Z" fill="#00249C" />
          </svg>
        </button>
      </div>
    </section>

    <section class="new-task open invisible">
      <div class="new-task-container">
        <h2 class="add-new-task">Добавить новую задачу</h2>
        <button class="new-task-button-open" type="button">
          <svg width="17" height="17" viewBox="0 0 19 19" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path
              d="M1.86667 18.6667L0 16.8L7.46667 9.33333L0 1.86667L1.86667 0L9.33333 7.46667L16.8 0L18.6667 1.86667L11.2 9.33333L18.6667 16.8L16.8 18.6667L9.33333 11.2L1.86667 18.6667Z"
              fill="#9C0000" />
          </svg>
        </button>
      </div>
      <form class="new-task-form">
        <div class="input-container">
          <label for="title">Название задачи</label>
          <input type="text" id="title" name="title">
        </div>

        <div class="input-container">
          <label for="description">Описание задачи</label>
          <input type="text" id="description" name="description">
        </div>

        <button type="button" class="add-new-task-button">Добавить задачу</button>
      </form>
    </section>

    <section class="task-list-container">
      <h2 class="task-list">Список задач</h2>

      <ul class="card-list">
        <li class="card-item">
          <h3 class="card-title">Название задачи</h3>
          <p class="card-description">Описание задачи</p>
          <div class="card-item-buttons">
            <button role="checkbox" class="check-button">
              <svg width="24" height="27" viewBox="0 0 24 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path fill-rule="evenodd" clip-rule="evenodd"
                  d="M23.5795 0.412939C23.8488 0.677687 24 1.03656 24 1.41074C24 1.78492 23.8488 2.1438 23.5795 2.40854L10.1589 15.5871C9.88924 15.8515 9.52377 16 9.14272 16C8.76167 16 8.3962 15.8515 8.12659 15.5871L0.457658 8.05648C0.316384 7.92721 0.203071 7.77133 0.12448 7.59813C0.045889 7.42492 0.00363029 7.23795 0.000223784 7.04836C-0.00318272 6.85878 0.0323328 6.67046 0.104653 6.49464C0.176973 6.31882 0.284615 6.15911 0.421158 6.02503C0.557701 5.89095 0.720347 5.78525 0.899393 5.71424C1.07844 5.64322 1.27022 5.60835 1.46329 5.61169C1.65636 5.61504 1.84677 5.65653 2.02315 5.73371C2.19954 5.81088 2.35828 5.92215 2.48992 6.06088L9.14272 12.5937L21.5472 0.412939C21.8168 0.148521 22.1823 0 22.5633 0C22.9444 0 23.3099 0.148521 23.5795 0.412939Z"
                  fill="#1BAD95" />
              </svg>
            </button>
            <button class="delete-button">
              <svg width="17" height="17" viewBox="0 0 19 19" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path
                  d="M1.86667 18.6667L0 16.8L7.46667 9.33333L0 1.86667L1.86667 0L9.33333 7.46667L16.8 0L18.6667 1.86667L11.2 9.33333L18.6667 16.8L16.8 18.6667L9.33333 11.2L1.86667 18.6667Z"
                  fill="#9C0000" />
              </svg>
            </button>
          </div>
        </li>
        <li class="card-item">
          <h3 class="card-title">Название задачи</h3>
          <p class="card-description">Описание задачи</p>
          <div class="card-item-buttons">
            <button role="checkbox" class="check-button">
              <svg width="24" height="27" viewBox="0 0 24 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path fill-rule="evenodd" clip-rule="evenodd"
                  d="M23.5795 0.412939C23.8488 0.677687 24 1.03656 24 1.41074C24 1.78492 23.8488 2.1438 23.5795 2.40854L10.1589 15.5871C9.88924 15.8515 9.52377 16 9.14272 16C8.76167 16 8.3962 15.8515 8.12659 15.5871L0.457658 8.05648C0.316384 7.92721 0.203071 7.77133 0.12448 7.59813C0.045889 7.42492 0.00363029 7.23795 0.000223784 7.04836C-0.00318272 6.85878 0.0323328 6.67046 0.104653 6.49464C0.176973 6.31882 0.284615 6.15911 0.421158 6.02503C0.557701 5.89095 0.720347 5.78525 0.899393 5.71424C1.07844 5.64322 1.27022 5.60835 1.46329 5.61169C1.65636 5.61504 1.84677 5.65653 2.02315 5.73371C2.19954 5.81088 2.35828 5.92215 2.48992 6.06088L9.14272 12.5937L21.5472 0.412939C21.8168 0.148521 22.1823 0 22.5633 0C22.9444 0 23.3099 0.148521 23.5795 0.412939Z"
                  fill="#1BAD95" />
              </svg>
            </button>
            <button class="delete-button">
              <svg width="17" height="17" viewBox="0 0 19 19" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path
                  d="M1.86667 18.6667L0 16.8L7.46667 9.33333L0 1.86667L1.86667 0L9.33333 7.46667L16.8 0L18.6667 1.86667L11.2 9.33333L18.6667 16.8L16.8 18.6667L9.33333 11.2L1.86667 18.6667Z"
                  fill="#9C0000" />
              </svg>
            </button>
          </div>
        </li>
      </ul>
    </section>

  </main>

  <footer>
    <div class="footer"></div>
  </footer>

  <script src="script.js"></script>
</body>

</html>
